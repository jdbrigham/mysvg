<body>
<canvas id="sky-canvas"></canvas>
<canvas id="landscape-canvas"></canvas>
<div id="star-tooltip"><span id="tt-name"></span><span class="mag" id="tt-mag"></span></div>
<div id="ui">
 <div id="time-panel">

 </div>

</div>
<script>
// ─── CONFIG ────────────────────────────────────────────────
const LAT = 42.3601 * Math.PI / 180; // Boston latitude (radians)
const LON = -71.0589; // Boston longitude (degrees)
const SKY_STARS = 2500;
// Spectral type color map (OBAFGKM sequence)
const SPECTRAL_COLORS = {
  O: 'rgba(155,180,255,1)',
  B: 'rgba(185,210,255,1)',
  A: 'rgba(220,232,255,1)',
  F: 'rgba(248,245,220,1)',
  G: 'rgba(255,238,180,1)',
  K: 'rgba(255,210,130,1)',
  M: 'rgba(255,175,95,1)',
};

// Star visual controls (single source of truth)
// const STAR_COLOR_OVERRIDE      = 'rgba(200,220,255,1)';
// const STAR_SIZE_MULTIPLIER     = 0.30;
// const STAR_BRIGHTNESS_SCALE    = 320;
// const STAR_MIN_RADIUS          = 0.08;
// const STAR_MAX_RADIUS          = 2.4;
// const STAR_GLOW_MAG_THRESHOLD  = 1.2;
// const STAR_GLOW_RADIUS_FACTOR  = 4.0;
// const STAR_GLOW_ALPHA_CORE     = 0.18;
// Star styling overrides (PATCH)
const STAR_COLOR_OVERRIDE = 'rgba(200,220,255,1)'; // cool white
const STAR_SIZE_MULTIPLIER = 0.10;                 // smaller, preserve relative sizes
// const STAR_MIN_RADIUS = 0.25;                      // slightly smaller floor
// const STAR_MAX_RADIUS = 3.2;                       // slightly lower cap
// Subtle glow tuning (PATCH)
const STAR_GLOW_MAG_THRESHOLD = 1.2;  // only very bright stars get a glow
const STAR_GLOW_RADIUS_FACTOR = 4.0;  // glow radius vs. star radius
const STAR_GLOW_ALPHA_CORE   = 0.18;  
// Additional size mapping controls (PATCH v2)
const STAR_BRIGHTNESS_SCALE = 320;   // default was 400; lower = smaller baseline radii
const STAR_MIN_RADIUS = 0.08;        // allow stars to shrink further before clamping
const STAR_MAX_RADIUS = 1.2;         // slightly lower cap so brights don't dominate
// inner glow alpha

const NAMED_STARS = [
 { name: "Sirius", ra: 6.7525, dec: -16.716, mag: -1.46, sp: 'A' },
 { name: "Canopus", ra: 6.3992, dec: -52.696, mag: -0.72, sp: 'F' },
 { name: "Arcturus", ra: 14.2612, dec: 19.182, mag: -0.05, sp: 'K' },
 { name: "Vega", ra: 18.6157, dec: 38.784, mag: 0.03, sp: 'A' },
 { name: "Capella", ra: 5.2781, dec: 45.998, mag: 0.08, sp: 'G' },
 { name: "Rigel", ra: 5.2423, dec: -8.202, mag: 0.13, sp: 'B' },
 { name: "Procyon", ra: 7.6553, dec: 5.225, mag: 0.34, sp: 'F' },
 { name: "Betelgeuse", ra: 5.9193, dec: 7.407, mag: 0.42, sp: 'M' },
 { name: "Altair", ra: 19.8463, dec: 8.868, mag: 0.76, sp: 'A' },
 { name: "Aldebaran", ra: 4.5987, dec: 16.509, mag: 0.85, sp: 'K' },
 { name: "Antares", ra: 16.4901, dec: -26.432, mag: 0.96, sp: 'M' },
 { name: "Spica", ra: 13.4199, dec: -11.161, mag: 1.04, sp: 'B' },
 { name: "Pollux", ra: 7.7553, dec: 28.026, mag: 1.14, sp: 'K' },
 { name: "Fomalhaut", ra: 22.9608, dec: -29.622, mag: 1.16, sp: 'A' },
 { name: "Deneb", ra: 20.6905, dec: 45.280, mag: 1.25, sp: 'A' },
 { name: "Regulus", ra: 10.1395, dec: 11.967, mag: 1.35, sp: 'B' },
 { name: "Adhara", ra: 6.9771, dec: -28.972, mag: 1.50, sp: 'B' },
 { name: "Castor", ra: 7.5766, dec: 31.888, mag: 1.58, sp: 'A' },
 { name: "Shaula", ra: 17.5600, dec: -37.104, mag: 1.62, sp: 'B' },
 { name: "Bellatrix", ra: 5.4188, dec: 6.350, mag: 1.64, sp: 'B' },
 { name: "Elnath", ra: 5.4382, dec: 28.608, mag: 1.65, sp: 'B' },
 { name: "Miaplacidus", ra: 9.2200, dec: -69.717, mag: 1.68, sp: 'A' },
 { name: "Alnilam", ra: 5.6036, dec: -1.202, mag: 1.69, sp: 'B' },
 { name: "Alnair", ra: 22.1374, dec: -46.961, mag: 1.74, sp: 'B' },
 { name: "Alnitak", ra: 5.6796, dec: -1.943, mag: 1.77, sp: 'O' },
 { name: "Mirfak", ra: 3.4054, dec: 49.861, mag: 1.79, sp: 'F' },
 { name: "Dubhe", ra: 11.0621, dec: 61.751, mag: 1.79, sp: 'K' },
 { name: "Wezen", ra: 7.1397, dec: -26.393, mag: 1.84, sp: 'F' },
 { name: "Alioth", ra: 12.9004, dec: 55.960, mag: 1.76, sp: 'A' },
 { name: "Kaus Australis", ra: 18.4028, dec: -34.384, mag: 1.85, sp: 'B' },
 { name: "Avior", ra: 8.3752, dec: -59.509, mag: 1.86, sp: 'K' },
 { name: "Alkaid", ra: 13.7923, dec: 49.313, mag: 1.86, sp: 'B' },
 { name: "Menkalinan", ra: 5.9927, dec: 44.948, mag: 1.90, sp: 'A' },
 { name: "Atria", ra: 16.8113, dec: -69.028, mag: 1.91, sp: 'K' },
 { name: "Alhena", ra: 6.6285, dec: 16.399, mag: 1.93, sp: 'A' },
 { name: "Peacock", ra: 20.4274, dec: -56.735, mag: 1.94, sp: 'B' },
 { name: "Polaris", ra: 2.5302, dec: 89.264, mag: 1.97, sp: 'F' },
 { name: "Mimosa", ra: 12.7954, dec: -59.689, mag: 1.25, sp: 'B' },
 { name: "Denebola", ra: 11.8177, dec: 14.572, mag: 2.14, sp: 'A' },
 { name: "Alphard", ra: 9.4597, dec: -8.659, mag: 1.99, sp: 'K' },
];
// ─── STATE ─────────────────────────────────────────────────
let simTime = new Date();
let speed = 60; // seconds per real second
let isLive = true;
let lastRealTime = Date.now();
let stars = [];
let mouseX = 0, mouseY = 0;
let hoveredStar = null;
// ─── CANVAS SETUP ──────────────────────────────────────────
const skyCanvas = document.getElementById('sky-canvas');
const skyCtx = skyCanvas.getContext('2d');
const landCanvas = document.getElementById('landscape-canvas');
const landCtx = landCanvas.getContext('2d');
function resize() {
  skyCanvas.width = landCanvas.width = window.innerWidth;
  skyCanvas.height = landCanvas.height = window.innerHeight;
  drawLandscape();
}
window.addEventListener('resize', resize);
// ─── ASTRONOMY MATH ────────────────────────────────────────
function julianDate(d) {
  return d / 86400000 + 2440587.5;
}
function lst(date) {
  const jd = julianDate(date);
  const T = (jd - 2451545.0) / 36525;
  let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545) +
    0.000387933 * T * T - T * T * T / 38710000;
  gmst = ((gmst % 360) + 360) % 360;
  return (gmst + LON + 360) % 360;
}
function raDecToAltAz(ra_hours, dec_deg, date) {
  const ra = ra_hours * 15; // degrees
  const dec = dec_deg * Math.PI / 180;
  const lstDeg = lst(date);
  const ha = ((lstDeg - ra) + 360) % 360;
  const haR = ha * Math.PI / 180;
  const sinAlt = Math.sin(dec) * Math.sin(LAT) +
                 Math.cos(dec) * Math.cos(LAT) * Math.cos(haR);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt)));
  const cosAz = (Math.sin(dec) - Math.sin(alt) * Math.sin(LAT)) /
                (Math.cos(alt) * Math.cos(LAT));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz)));
  if (Math.sin(haR) > 0) az = 2 * Math.PI - az;
  return { alt: alt * 180 / Math.PI, az: az * 180 / Math.PI };
}
// Better: equirectangular-like projection centered on south
function projectStar(alt, az, w, h) {
  const horizonY = h * 0.73;
  // Center view on South (az=180)
  let daz = az - 180;
  if (daz > 180) daz -= 360;
  if (daz < -180) daz += 360;
  const x = w / 2 + (w / 2) * (daz / 110); // ~110 degrees of az visible
  const y = horizonY - (horizonY * 1.05) * (alt / 85);
  return { x, y };
}
// ─── STAR GENERATION ───────────────────────────────────────
function initStars() {
  stars = [];
  // Named bright stars
  for (const s of NAMED_STARS) {
    stars.push({
      ra: s.ra, dec: s.dec, mag: s.mag,
      name: s.name, named: true,
      color: SPECTRAL_COLORS[s.sp] || SPECTRAL_COLORS.A
    });
  }
  // Random background stars using a seeded distribution
  const seed = 42;
  function seededRand(i) {
    let x = Math.sin(i * 127.1 + seed * 311.7) * 43758.5453;
    return x - Math.floor(x);
  }
  for (let i = 0; i < SKY_STARS; i++) {
    const ra = seededRand(i * 3) * 24;
    const dec = (seededRand(i * 3 + 1) * 2 - 1);
    const decDeg = Math.asin(dec) * 180 / Math.PI;
    if (decDeg < -55) continue; // limit what's visible from Boston
    const mag = 2.0 + seededRand(i * 3 + 2) * 4.5;
    // We keep spectral color in data; draw step will apply override
    stars.push({ ra, dec: decDeg, mag, named: false, color: randomStarColor(i) });
  }
}
function randomStarColor(i) {
  const r = Math.sin(i * 0.3 + 1) * 0.5 + 0.5;
  if (r < 0.05) return SPECTRAL_COLORS.O;
  if (r < 0.18) return SPECTRAL_COLORS.B;
  if (r < 0.35) return SPECTRAL_COLORS.A;
  if (r < 0.55) return SPECTRAL_COLORS.F;
  if (r < 0.72) return SPECTRAL_COLORS.G;
  if (r < 0.88) return SPECTRAL_COLORS.K;
  return SPECTRAL_COLORS.M;
}
// ─── LANDSCAPE DRAWING ─────────────────────────────────────
function drawLandscape() {
  const w = landCanvas.width;
  const h = landCanvas.height;
  landCtx.clearRect(0, 0, w, h);
  const horizonY = h * 0.73;
  // Background glow at horizon
  const horizGrad = landCtx.createLinearGradient(0, horizonY - 60, 0, horizonY + 20);
  horizGrad.addColorStop(0, 'rgba(30,50,120,0)');
  horizGrad.addColorStop(1, 'rgba(10,20,60,0.5)');
  landCtx.fillStyle = horizGrad;
  landCtx.fillRect(0, horizonY - 60, w, 80);
  // Draw layered mountains/hills
  drawMountainLayer(landCtx, w, h, horizonY, 0.42, 0.22, 8, '#0a0d1a', 12);
  drawMountainLayer(landCtx, w, h, horizonY, 0.32, 0.18, 6, '#080c17', 7);
  drawMountainLayer(landCtx, w, h, horizonY, 0.25, 0.12, 5, '#060a14', 3);
  drawMountainLayer(landCtx, w, h, horizonY, 0.15, 0.08, 7, '#050810', 1);
  // Very subtle city glow on horizon (Boston light pollution)
  const cityGlow = landCtx.createRadialGradient(w * 0.5, horizonY, 0, w * 0.5, horizonY, w * 0.4);
  cityGlow.addColorStop(0, 'rgba(60,40,20,0.35)');
  cityGlow.addColorStop(1, 'rgba(0,0,0,0)');
  landCtx.fillStyle = cityGlow;
  landCtx.fillRect(0, horizonY - 40, w, 80);
}
function drawMountainLayer(ctx, w, h, horizonY, heightFactor, variance, peaks, color, seed) {
  ctx.beginPath();
  ctx.moveTo(0, h);
  const points = [];
  const numPts = peaks * 4 + 2;
  for (let i = 0; i <= numPts; i++) {
    const x = (i / numPts) * w;
    let y;
    if (i === 0 || i === numPts) {
      y = horizonY;
    } else {
      const base = horizonY - h * heightFactor;
      const noise = (Math.sin(i * seed * 1.3 + seed) * 0.5 + 0.5) * h * variance;
      const noise2 = (Math.sin(i * seed * 2.7 + seed * 1.5) * 0.5 + 0.5) * h * variance * 0.4;
      y = base + noise + noise2;
    }
    points.push({ x, y });
  }
  ctx.moveTo(0, h);
  ctx.lineTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const cpx = (prev.x + curr.x) / 2;
    ctx.quadraticCurveTo(prev.x, prev.y, cpx, (prev.y + curr.y) / 2);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}
// ─── SKY RENDERING ─────────────────────────────────────────
function drawSky() {
  const w = skyCanvas.width;
  const h = skyCanvas.height;
  const horizonY = h * 0.73;
  skyCtx.clearRect(0, 0, w, h);
  // Sky gradient
  const skyGrad = skyCtx.createLinearGradient(0, 0, 0, horizonY);
  skyGrad.addColorStop(0,   '#02081a');
  skyGrad.addColorStop(0.4, '#04122e');
  skyGrad.addColorStop(0.85,'#0a1e4a');
  skyGrad.addColorStop(1,   '#0f2a66');
  skyCtx.fillStyle = skyGrad;
  skyCtx.fillRect(0, 0, w, horizonY + 10);
  // Milky Way band
  drawMilkyWay(w, h, horizonY);
  // Stars
  drawStars(w, h, horizonY);
}
function drawMilkyWay(w, h, horizonY) {
  const milkyPoints = [
    { ra: 19.0, dec: 20 }, { ra: 18.5, dec: 5 }, { ra: 18.0, dec: -15 },
    { ra: 17.76, dec: -28.9 }, { ra: 17.0, dec: -35 }, { ra: 13.0, dec: -60 },
    { ra: 20.5, dec: 40 }, { ra: 21.5, dec: 50 }, { ra: 6.0, dec: 20 },
    { ra: 7.5, dec: -10 }, { ra: 5.0, dec: 10 }
  ];
  for (const mp of milkyPoints) {
    const aa = raDecToAltAz(mp.ra, mp.dec, simTime);
    if (aa.alt < -20) continue;
    const pos = projectStar(aa.alt, aa.az, w, h);
    if (pos.x < -200 || pos.x > w + 200 || pos.y > horizonY + 50) continue;
    const r = w * 0.18;
    const grd = skyCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
    grd.addColorStop(0, 'rgba(80,90,140,0.04)');
    grd.addColorStop(0.5, 'rgba(60,70,110,0.025)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    skyCtx.fillStyle = grd;
    skyCtx.fillRect(pos.x - r, pos.y - r, r * 2, r * 2);
  }
}
function drawStars(w, h, horizonY) {
  hoveredStar = null;
  for (const star of stars) {
    const aa = raDecToAltAz(star.ra, star.dec, simTime);
    if (aa.alt < -2) continue;
    const pos = projectStar(aa.alt, aa.az, w, h);
    if (pos.x < 0 || pos.x > w || pos.y > horizonY - 5 || pos.y < 0) continue;
    // Atmospheric extinction near horizon
    const extinction = aa.alt < 10 ? (10 - aa.alt) / 10 * 0.7 : 0;
    const effectiveMag = star.mag + extinction * 2;
    if (effectiveMag > 6.5 && !star.named) continue;
    // Size from magnitude (PATCH: apply multiplier & clamps)
    const brightness = Math.pow(10, -effectiveMag / 5) * STAR_BRIGHTNESS_SCALE;
    const radiusRaw = brightness * STAR_SIZE_MULTIPLIER;
    const radius = Math.max(STAR_MIN_RADIUS, Math.min(STAR_MAX_RADIUS, radiusRaw));
    // Alpha after extinction
    const alpha = Math.max(0.15, Math.min(1, 1 - extinction * 0.8));
    // Base color (PATCH: unified cool white override)
    const baseCol = (STAR_COLOR_OVERRIDE || star.color);
    // Subtle glow for bright stars only (PATCH)
    if (star.mag < STAR_GLOW_MAG_THRESHOLD) {
      const glowR = radius * STAR_GLOW_RADIUS_FACTOR;
      const grd = skyCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
      grd.addColorStop(0, baseCol.replace('1)', `${alpha * STAR_GLOW_ALPHA_CORE})`));
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      skyCtx.fillStyle = grd;
      skyCtx.beginPath();
      skyCtx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      skyCtx.fill();
    }
    // Star point
    skyCtx.beginPath();
    skyCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    skyCtx.fillStyle = baseCol.replace('1)', `${alpha})`);
    skyCtx.fill();
    // Diffraction spikes for extremely bright stars (slightly toned)
    if (star.mag < 0.5) {
      skyCtx.strokeStyle = baseCol.replace('1)', `${alpha * 0.20})`);
      skyCtx.lineWidth = 0.5;
      const spikeLen = radius * 10;
      skyCtx.beginPath();
      skyCtx.moveTo(pos.x - spikeLen, pos.y);
      skyCtx.lineTo(pos.x + spikeLen, pos.y);
      skyCtx.moveTo(pos.x, pos.y - spikeLen);
      skyCtx.lineTo(pos.x, pos.y + spikeLen);
      skyCtx.stroke();
    }
    // Mouse hover detection (for named stars)
    if (star.named) {
      const dx = mouseX - pos.x, dy = mouseY - pos.y;
      if (dx * dx + dy * dy < 200) {
        hoveredStar = { ...star, x: pos.x, y: pos.y, alt: aa.alt, az: aa.az };
      }
    }
  }
}
// ─── TOOLTIP ───────────────────────────────────────────────
const tooltip = document.getElementById('star-tooltip');
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
function updateTooltip() {
  if (hoveredStar) {
    document.getElementById('tt-name').textContent = hoveredStar.name;
    document.getElementById('tt-mag').textContent =
      `mag ${hoveredStar.mag.toFixed(2)} · alt ${hoveredStar.alt.toFixed(1)}°`;
    tooltip.style.display = 'block';
    tooltip.style.left = (hoveredStar.x + 14) + 'px';
    tooltip.style.top = (hoveredStar.y - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}
// ─── TIME / UI ─────────────────────────────────────────────
const hourSlider = document.getElementById('hour-slider');
const daySlider = document.getElementById('day-slider');
const dateDisplay = document.getElementById('date-display');
const liveBtn = document.getElementById('live-btn');
function setLive(v) {
  isLive = v;
  liveBtn.classList.toggle('active', v);
  if (v) {
    simTime = new Date();
    syncSlidersToTime();
  }
}
function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (s === 0) document.getElementById('sp0').classList.add('active');
  else if (s === 60) document.getElementById('sp1').classList.add('active');
  else if (s === 3600) document.getElementById('sp2').classList.add('active');
  else if (s === 86400) document.getElementById('sp3').classList.add('active');
}
function syncSlidersToTime() {
  const h = simTime.getHours() + simTime.getMinutes() / 60 + simTime.getSeconds() / 3600;
  const start = new Date(simTime.getFullYear(), 0, 0);
  const diff = simTime - start;
  const day = Math.floor(diff / 86400000);
  hourSlider.value = h;
  daySlider.value = Math.min(364, day);
}
function syncTimeToSliders() {
  const year = simTime.getFullYear();
  const day = parseInt(daySlider.value);
  const hour = parseFloat(hourSlider.value);
  const d = new Date(year, 0, day + 1);
  d.setHours(Math.floor(hour), Math.round((hour % 1) * 60), 0, 0);
  simTime = d;
}
hourSlider.addEventListener('input', () => { setLive(false); syncTimeToSliders(); });
daySlider.addEventListener('input', () => { setLive(false); syncTimeToSliders(); });
liveBtn.addEventListener('click', () => setLive(!isLive));
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function updateDateDisplay() {
  const d = simTime;
  const h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = ((h % 12) || 12);
  dateDisplay.textContent = `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h12}:${m} ${ampm}`;
}
// ─── MAIN LOOP ─────────────────────────────────────────────
setLive(true);
setSpeed(60);
initStars();
resize();
function loop() {
  const now = Date.now();
  const dt = (now - lastRealTime) / 1000; // real seconds elapsed
  lastRealTime = now;
  if (isLive) {
    simTime = new Date();
    syncSlidersToTime();
  } else if (speed > 0) {
    simTime = new Date(simTime.getTime() + dt * speed * 1000);
    syncSlidersToTime();
  }
  updateDateDisplay();
  drawSky();
  updateTooltip();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
