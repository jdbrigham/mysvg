<svg viewBox="0 0 610 610" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .wall {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: miter;
        stroke-linecap: square;
        vector-effect: non-scaling-stroke;
      }

      .fill-light {
        fill-opacity: 0.18;
      }

      .fill-dark {
        fill-opacity: 0.7;
      }

      .label {
        font-family: Arial, sans-serif;
        font-size: 10px;
        text-anchor: middle;
      }

      .label-small {
        font-size: 5px;
      }

      .street {
        font-size: 18px;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- ================= FLOOR 1 ================= -->
  <g id="floor1" class="floor" shape-rendering="crispEdges">

    <!-- Core structure -->
    <rect class="wall" x="258" y="382" width="75" height="74"/>
    <rect class="wall" x="258" y="309" width="91" height="74"/>
    <rect class="wall" x="345" y="259" width="16" height="16"/>

    <path class="wall"
      d="M346 307
         V254
         H184
         V281
         H265
         V307
         Z"/>

    <path class="wall"
      d="M350 323
         L360 330
         V357
         L349 364
         Z"/>

    <rect class="wall" x="210" y="282" width="46" height="32"/>
    <rect class="wall" x="209" y="380" width="46" height="32"/>
    <rect class="wall" x="143" y="406" width="66" height="48"/>
    <rect class="wall" x="335" y="383" width="15" height="73"/>
    <rect class="wall" x="211" y="423" width="46" height="32"/>
    <rect class="wall" x="217" y="455" width="37" height="25"/>
    <rect class="wall" x="367" y="210" width="85" height="44"/>

    <!-- Barn / Large areas -->
    <path class="wall fill-light"
      d="M290 53
         V183
         V240
         H347
         V183
         H373
         V53
         Z"/>

    <rect class="wall fill-light" x="382" y="52" width="105" height="130"/>
    <rect class="wall fill-light" x="460" y="373" width="44" height="40"/>
    <rect class="wall fill-light" x="514" y="372" width="45" height="86"/>
    <rect class="wall fill-light" x="49" y="391" width="79" height="100"/>

    <rect class="wall fill-dark" x="53" y="500" width="166" height="21"/>
    <rect class="wall fill-dark" x="243" y="501" width="127" height="21"/>

    <rect class="wall fill-light" x="33" y="275" width="124" height="57"/>

    <!-- Labels -->
    <text class="label" x="425" y="236">BARN</text>
    <text class="label" x="480" y="310">STUDIO</text>
    <text class="label" x="305" y="273">KITCHEN</text>
    <text class="label" x="230" y="300">BATH</text>
    <text class="label" x="300" y="338">DR</text>

    <text class="label" x="300" y="418">FAMILY ROOM</text>
    <text class="label" x="235" y="399">STUDY</text>
    <text class="label" x="235" y="420">CLOSET</text>
    <text class="label" x="235" y="442">HALL</text>
    <text class="label" x="175" y="432">LIVING ROOM</text>

    <text class="label-small" x="235" y="468">FRONT PORCH</text>
    <text class="street" x="305" y="575">CONCORD AVENUE</text>

  </g>

  <!-- ================= FLOOR 2 ================= -->
  <g id="floor2" class="floor" style="display:none" shape-rendering="crispEdges">

    <rect class="wall" x="259" y="383" width="75" height="74"/>
    <rect class="wall" x="211" y="381" width="46" height="32"/>
    <rect class="wall" x="144" y="407" width="66" height="48"/>
    <rect class="wall" x="212" y="424" width="46" height="32"/>
    <rect class="wall" x="218" y="456" width="37" height="25"/>

    <text class="label" x="235" y="400">BR</text>
    <text class="label" x="290" y="422">BR</text>
    <text class="label" x="170" y="435">BR</text>
    <text class="label-small" x="240" y="470">BATHROOM</text>

  </g>

</svg>